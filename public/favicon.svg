<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 500;
      font-style: italic;
    }
    .bg { fill: #f3f2f2; }
    .text { fill: #1a1816; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #141210; }
      .text { fill: #f3f2f2; }
    }
  </style>
  <rect class="bg" width="32" height="32" rx="4"/>
  <text class="text" x="16" y="23" font-size="16" text-anchor="middle">p.v.</text>
</svg>
